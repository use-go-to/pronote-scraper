<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pronote Dashboard</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3e;
      --accent: #6c63ff;
      --accent2: #ff6584;
      --text: #e2e8f0;
      --muted: #64748b;
      --green: #22c55e;
      --yellow: #eab308;
      --red: #ef4444;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
    }
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }
    .logo { font-size: 1.4rem; font-weight: 700; color: var(--accent); }
    .logo span { color: var(--text); }
    #status-badge {
      font-size: 0.75rem;
      padding: 0.3rem 0.8rem;
      border-radius: 999px;
      background: var(--border);
      color: var(--muted);
    }
    #status-badge.connected { background: #16532d; color: var(--green); }

    main { max-width: 1100px; margin: 0 auto; padding: 2rem 1rem; }

    /* Login */
    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2rem;
      max-width: 420px;
      margin: 3rem auto;
    }
    .login-card h2 { font-size: 1.2rem; margin-bottom: 1.5rem; color: var(--text); }
    .field { margin-bottom: 1rem; }
    .field label { display: block; font-size: 0.8rem; color: var(--muted); margin-bottom: 0.4rem; }
    .field input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.7rem 1rem;
      color: var(--text);
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .field input:focus { border-color: var(--accent); }
    .btn {
      width: 100%;
      padding: 0.75rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-sm {
      padding: 0.4rem 1rem;
      font-size: 0.8rem;
      width: auto;
      border-radius: 6px;
    }
    .btn-ghost {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
    }
    .btn-ghost:hover { border-color: var(--accent); color: var(--text); opacity: 1; }
    #error-msg { color: var(--red); font-size: 0.85rem; margin-top: 0.5rem; min-height: 1.2rem; }

    /* Dashboard */
    #dashboard { display: none; }
    .tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 2rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 0;
    }
    .tab-btn {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 0.9rem;
      padding: 0.6rem 1.2rem;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
      margin-bottom: -1px;
    }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab-btn:hover:not(.active) { color: var(--text); }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* Notes */
    .trimestre-btns { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }
    .tri-btn {
      padding: 0.4rem 1rem;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.2s;
    }
    .tri-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    .notes-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1rem;
    }
    .note-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem 1.2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      transition: border-color 0.2s;
    }
    .note-card:hover { border-color: var(--accent); }
    .note-badge {
      min-width: 58px;
      height: 58px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      font-weight: 700;
      flex-shrink: 0;
    }
    .note-info { flex: 1; min-width: 0; }
    .note-matiere { font-weight: 600; font-size: 0.85rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .note-sujet { font-size: 0.75rem; color: var(--muted); margin-top: 0.15rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .note-meta { font-size: 0.72rem; color: var(--muted); margin-top: 0.3rem; }
    .note-date { font-size: 0.7rem; color: var(--muted); text-align: right; align-self: flex-start; padding-top: 0.1rem; }

    /* EDT */
    .cours-list { display: flex; flex-direction: column; gap: 0.75rem; }
    .cours-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0.9rem 1.2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .cours-item.en-cours { border-color: var(--green); box-shadow: 0 0 0 1px var(--green)22; }
    .cours-color { width: 5px; height: 42px; border-radius: 4px; flex-shrink: 0; }
    .cours-heures { font-size: 0.8rem; color: var(--muted); min-width: 80px; text-align: center; }
    .cours-heures strong { display: block; font-size: 0.95rem; color: var(--text); }
    .cours-infos { flex: 1; }
    .cours-matiere { font-weight: 600; font-size: 0.9rem; }
    .cours-prof { font-size: 0.8rem; color: var(--muted); margin-top: 0.1rem; }
    .cours-salle { font-size: 0.8rem; background: var(--bg); padding: 0.2rem 0.6rem; border-radius: 4px; color: var(--text); }
    .badge-live { font-size: 0.7rem; background: #16532d; color: var(--green); padding: 0.2rem 0.5rem; border-radius: 4px; }

    /* Cantine */
    .cantine-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1rem;
    }
    .cantine-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }
    .cantine-day {
      background: var(--accent);
      padding: 0.7rem 1rem;
      font-weight: 700;
      font-size: 0.85rem;
      text-transform: capitalize;
    }
    .cantine-plats { padding: 0.8rem 1rem; }
    .cantine-plat {
      font-size: 0.8rem;
      padding: 0.4rem 0;
      border-bottom: 1px solid var(--border);
      color: var(--text);
      display: flex;
      gap: 0.4rem;
      align-items: flex-start;
    }
    .cantine-plat:last-child { border-bottom: none; }
    .bio-badge { font-size: 0.65rem; background: #14532d; color: #4ade80; padding: 0.1rem 0.4rem; border-radius: 3px; flex-shrink: 0; margin-top: 0.1rem; }

    /* Loading */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem;
      gap: 0.5rem;
      color: var(--muted);
    }
    .spinner {
      width: 20px; height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty { text-align: center; color: var(--muted); padding: 2rem; font-size: 0.9rem; }

    .top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
    .section-title { font-size: 1.1rem; font-weight: 700; }
    .refresh-btn { display: flex; align-items: center; gap: 0.4rem; }
  </style>
</head>
<body>
  <header>
    <div class="logo">Pronote<span>+</span></div>
    <div id="status-badge">⚪ Non connecté</div>
  </header>

  <main>
    <!-- Login -->
    <div id="login-view">
      <div class="login-card">
        <h2>🔐 Connexion Toutatice → Pronote</h2>
        <div class="field">
          <label>Identifiant EduConnect</label>
          <input type="text" id="inp-user" placeholder="p.nomXX" autocomplete="off"/>
        </div>
        <div class="field">
          <label>Mot de passe</label>
          <input type="password" id="inp-pass" placeholder="••••••••" autocomplete="off"/>
        </div>
        <button class="btn" id="btn-login" onclick="doLogin()">Se connecter</button>
        <div id="error-msg"></div>
      </div>
    </div>

    <!-- Dashboard -->
    <div id="dashboard">
      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('notes', this)">📊 Notes</button>
        <button class="tab-btn" onclick="switchTab('edt', this)">📅 Emploi du temps</button>
        <button class="tab-btn" onclick="switchTab('cantine', this)">🍽️ Cantine</button>
      </div>

      <!-- Notes -->
      <div id="tab-notes" class="tab-panel active">
        <div class="top-bar">
          <div>
            <div class="section-title">Mes notes</div>
            <div class="trimestre-btns" style="margin-top:0.6rem">
              <button class="tri-btn" onclick="loadNotes(1,this)">Trimestre 1</button>
              <button class="tri-btn active" onclick="loadNotes(2,this)">Trimestre 2</button>
              <button class="tri-btn" onclick="loadNotes(3,this)">Trimestre 3</button>
            </div>
          </div>
          <button class="btn btn-sm btn-ghost refresh-btn" onclick="loadNotes(currentTri)">
            🔄 Rafraîchir
          </button>
        </div>
        <div id="notes-content"><div class="loading"><div class="spinner"></div> Chargement…</div></div>
      </div>

      <!-- EDT -->
      <div id="tab-edt" class="tab-panel">
        <div class="top-bar">
          <div class="section-title">Emploi du temps du jour</div>
          <button class="btn btn-sm btn-ghost refresh-btn" onclick="loadEDT()">🔄 Rafraîchir</button>
        </div>
        <div id="edt-content"><div class="loading"><div class="spinner"></div> Chargement…</div></div>
      </div>

      <!-- Cantine -->
      <div id="tab-cantine" class="tab-panel">
        <div class="top-bar">
          <div class="section-title">Menu de la cantine</div>
          <button class="btn btn-sm btn-ghost refresh-btn" onclick="loadCantine()">🔄 Rafraîchir</button>
        </div>
        <div id="cantine-content"><div class="loading"><div class="spinner"></div> Chargement…</div></div>
      </div>
    </div>
  </main>

  <script>
    let currentUser = '', currentPass = '', currentTri = 2;

    // ─── Utils ───────────────────────────────────────────────────────
    function noteColor(note, sur) {
      const pct = note / sur;
      if (pct >= 0.7) return { bg: '#14532d', text: '#4ade80' };
      if (pct >= 0.5) return { bg: '#713f12', text: '#facc15' };
      return { bg: '#450a0a', text: '#f87171' };
    }

    function switchTab(name, el) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      el.classList.add('active');
      document.getElementById('tab-' + name).classList.add('active');
      if (name === 'edt' && document.getElementById('edt-content').innerHTML.includes('Chargement')) loadEDT();
      if (name === 'cantine' && document.getElementById('cantine-content').innerHTML.includes('Chargement')) loadCantine();
    }

    function apiUrl(path) {
      return window.location.origin + path;
    }

    // ─── Login ───────────────────────────────────────────────────────
    async function doLogin() {
      const btn = document.getElementById('btn-login');
      const errEl = document.getElementById('error-msg');
      currentUser = document.getElementById('inp-user').value.trim();
      currentPass = document.getElementById('inp-pass').value.trim();
      errEl.textContent = '';
      if (!currentUser || !currentPass) { errEl.textContent = 'Remplis les deux champs.'; return; }

      btn.disabled = true;
      btn.textContent = '⏳ Connexion en cours (30s~)…';

      try {
        const res = await fetch(apiUrl('/api/login'), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: currentUser, password: currentPass }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Erreur connexion');

        document.getElementById('login-view').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        const badge = document.getElementById('status-badge');
        badge.textContent = '🟢 Connecté – ' + currentUser;
        badge.classList.add('connected');
        loadNotes(2);
      } catch (e) {
        errEl.textContent = '❌ ' + e.message;
        btn.disabled = false;
        btn.textContent = 'Se connecter';
      }
    }

    // Enter to submit
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter' && document.getElementById('login-view').style.display !== 'none') doLogin();
    });

    // ─── Notes ───────────────────────────────────────────────────────
    async function loadNotes(tri, btnEl) {
      currentTri = tri;
      if (btnEl) {
        document.querySelectorAll('.tri-btn').forEach(b => b.classList.remove('active'));
        btnEl.classList.add('active');
      }
      const el = document.getElementById('notes-content');
      el.innerHTML = '<div class="loading"><div class="spinner"></div> Chargement des notes T' + tri + '…</div>';

      try {
        const res = await fetch(apiUrl(`/api/notes?username=${encodeURIComponent(currentUser)}&password=${encodeURIComponent(currentPass)}&trimestre=${tri}`));
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail);

        if (!data.notes.length) { el.innerHTML = '<div class="empty">Aucune note trouvée.</div>'; return; }

        // Calcul moyenne générale
        const notables = data.notes.filter(n => n.note_sur_20 !== null);
        const moy = notables.length ? (notables.reduce((s, n) => s + n.note_sur_20, 0) / notables.length).toFixed(2) : '—';

        let html = `<div style="margin-bottom:1rem;font-size:0.85rem;color:var(--muted)">${data.count} notes · Moyenne générale : <strong style="color:var(--text)">${moy}/20</strong></div>`;
        html += '<div class="notes-grid">';

        for (const n of data.notes) {
          const affNote = n.note !== null ? `${n.note}/${n.sur}` : 'Abs';
          const sur20 = n.note_sur_20 !== null ? `(${n.note_sur_20}/20)` : '';
          const c = n.note_sur_20 !== null ? noteColor(n.note_sur_20, 20) : { bg: '#1e293b', text: '#94a3b8' };
          html += `
            <div class="note-card">
              <div class="note-badge" style="background:${c.bg};color:${c.text}">${n.note !== null ? n.note : '—'}</div>
              <div class="note-info">
                <div class="note-matiere">${escHtml(n.matiere)}</div>
                ${n.sujet ? `<div class="note-sujet">${escHtml(n.sujet)}</div>` : ''}
                <div class="note-meta">${escHtml(n.sur !== 20 ? `sur ${n.sur} ${sur20}` : '/20')} · ${escHtml(n.moyenne_classe)}</div>
              </div>
              <div class="note-date">${escHtml(n.date)}</div>
            </div>`;
        }
        html += '</div>';
        el.innerHTML = html;
      } catch (e) {
        el.innerHTML = `<div class="empty">❌ ${escHtml(e.message)}</div>`;
      }
    }

    // ─── EDT ─────────────────────────────────────────────────────────
    async function loadEDT() {
      const el = document.getElementById('edt-content');
      el.innerHTML = '<div class="loading"><div class="spinner"></div> Chargement…</div>';
      try {
        const res = await fetch(apiUrl(`/api/emploi-du-temps?username=${encodeURIComponent(currentUser)}&password=${encodeURIComponent(currentPass)}`));
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail);
        if (!data.cours.length) { el.innerHTML = '<div class="empty">Aucun cours trouvé.</div>'; return; }

        let html = '<div class="cours-list">';
        for (const c of data.cours) {
          html += `
            <div class="cours-item${c.en_cours ? ' en-cours' : ''}">
              <div class="cours-color" style="background:${c.couleur || '#6c63ff'}"></div>
              <div class="cours-heures"><strong>${escHtml(c.debut)}</strong>${escHtml(c.fin)}</div>
              <div class="cours-infos">
                <div class="cours-matiere">${escHtml(c.matiere)} ${c.en_cours ? '<span class="badge-live">● EN COURS</span>' : ''}</div>
                <div class="cours-prof">${escHtml(c.prof)}</div>
              </div>
              <div class="cours-salle">${escHtml(c.salle)}</div>
            </div>`;
        }
        html += '</div>';
        el.innerHTML = html;
      } catch (e) {
        el.innerHTML = `<div class="empty">❌ ${escHtml(e.message)}</div>`;
      }
    }

    // ─── Cantine ─────────────────────────────────────────────────────
    async function loadCantine() {
      const el = document.getElementById('cantine-content');
      el.innerHTML = '<div class="loading"><div class="spinner"></div> Chargement…</div>';
      try {
        const res = await fetch(apiUrl(`/api/cantine?username=${encodeURIComponent(currentUser)}&password=${encodeURIComponent(currentPass)}`));
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail);
        if (!data.menus.length) { el.innerHTML = '<div class="empty">Aucun menu trouvé.</div>'; return; }

        let html = '<div class="cantine-grid">';
        for (const m of data.menus) {
          html += `<div class="cantine-card"><div class="cantine-day">${escHtml(m.jour)}</div><div class="cantine-plats">`;
          for (const p of m.plats) {
            html += `<div class="cantine-plat">${p.bio ? '<span class="bio-badge">BIO</span>' : ''}<span>${escHtml(p.plat)}</span></div>`;
          }
          html += '</div></div>';
        }
        html += '</div>';
        el.innerHTML = html;
      } catch (e) {
        el.innerHTML = `<div class="empty">❌ ${escHtml(e.message)}</div>`;
      }
    }

    function escHtml(s) {
      if (!s) return '';
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
  </script>
</body>
</html>
